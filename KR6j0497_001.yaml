body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑑正號大廣智大興善寺三藏沙門不空奉詔譯出陀羅尼集經第十一諸天下卷身呪曩謨尾那翼迦二合瀉賀悉底二合母佉瀉怛儞野二合他唵娜去聲下同翼迦二合娜翼迦二合尾娜翼迦二合尾娜翼迦二合怛囉二合簸哩二合怛囉二合翼迦二合餉引佉賀悉底二合餉引佉迦只多扇上底迦囉二合娑嚩二合引賀引心呪唵擬上哩虐心中心呪唵虐虐吽娑嚩二合引賀若欲作此天法先須畫像或用白鑞銅木等及花木若鑄若刻並得其像形夫婦二身令相抱立各長五寸或七寸皆得並作象頭人身造像不得違價其像成已當以白月一日於淨室內用淨牛糞摩作圓壇隨意大小當取一升清細麻油以淨銅器盛之用上呪文呪油一百八遍即暖其油然後將像放著油中安置壇內用淨銅匙銅杓等率油灌其二像頂身一百八遍一日之中七遍灌之平曉四遍日午三遍共成七遍已後每日更呪舊油以灌其像如是作法乃至七日隨心所願即得稱意正灌油之時數數發願復用酥蜜和作團及蘿蔔根并一盞酒及歡喜團時新花果等如是日別取新者供養一切善事隨意成就一切災禍悉皆銷滅其所獻食必須自食始得氣力請召印以二小指二無名指相鉤向內即以二中指竪相叉又以二頭指各竪附中指以二大指亦竪附近頭指側大指來去呪曰唵簸迦囉二合主拏禰去嚩哆野二合誦七遍讚歎呪唵誐娜簸波上下同底扇上聲呼底娑嚩二合引悉底摩賀誐娜簸底娑嚩二合引賀引送呪唵簸迦囉二合主拏禰去嚩哆野二合娑嚩二合引賀引誦七遍呪水護身呪唵吉里吉里跋折囉二合引吽泮吒半音若欲作法時先以上呪呪水七遍用洗口并更取水呪七遍用楊柳散灑身上即為護身然後入持誦室中作法之所洗浴呪唵阿拏婆折唎二合婆跛隸拏訶以上呪呪水七遍當用洗浴調和毗那夜迦法請一切天作帝殊羅施印以二小指無名指相叉於掌內竪二中指指頭相捻以二頭指各加中指背第一節下半分大指來去呪曰唵一鑠都嚕二波羅摩馱儞曳三莎訶誦七遍但是誦呪人夢中驚怖見諸畜生惡境界等當知是毗那夜迦王瞋夢中覺已即慚愧乞莫瞋明日自有飲食勞謝以水摩地作二肘水圓壇如槃大亦得即取𩟘餅五顆蘿蔔根三顆火燒熟有花著花并燒白膠薰陸等香安於壇中呪人壇西面向東坐誦大自在天呪一百八遍已口云慚愧好去如是語已壇中雜物盤盛出門向西棄却西北亦得口云薩婆藥叉囉闍阿藹捨訶娑鉢闍伽車作是語已棄却即歸大自在天呪曰唵一毗跢囉薩尼二波囉末唎達尼三瞋達尼瞋達尼四頻達尼頻達尼五莎訶誦呪一百八遍即心歡喜非但夢中但覺有魔事即作前法定好造像法其像形端立象頭人身左牙出右牙折面少向左其鼻向外瘻有六臂其左上手把刀次手把果盤下手把輪右上手把棒次手把索下手把牙造此像不得違價足數付之若鑄若刻若畫並得右此大聖大祕要法人間希有實勿傳之宜誡慎也
